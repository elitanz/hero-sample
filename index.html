<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0e0c09" />
<title>Maren &amp; Oak — Nordic Coffee House</title>
<meta name="description" content="Maren & Oak — a Nordic-inspired coffee house in Minneapolis. Slow mornings, single-origin roasts, fresh pastry." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --ink:#16140f;
    --cream:#f6f1e7;
    --accent:#c98a3c;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  /* dark page background so the phone status bar / toolbar areas blend with the
     hero instead of showing a white/cream strip at the top and bottom */
  html{background:#0e0c09}
  body{
    font-family:'Inter',system-ui,sans-serif;color:var(--ink);background:#0e0c09;
    -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
    text-rendering:optimizeLegibility;
  }

  /* ---------- NAV: solid from the start ---------- */
  .nav{
    position:fixed;top:0;left:0;right:0;z-index:50;
    display:flex;align-items:center;justify-content:space-between;
    padding:calc(14px + env(safe-area-inset-top)) clamp(20px,5vw,56px) 14px;
    background:rgba(14,12,9,.94);
    backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px);
    box-shadow:0 8px 30px -16px rgba(0,0,0,.6);
    /* hidden over the hero — slides in only after you scroll past it */
    transform:translateY(-100%);
    opacity:0;pointer-events:none;
    transition:transform .45s cubic-bezier(.2,.7,.2,1),opacity .35s ease;
  }
  .nav.nav--show{transform:none;opacity:1;pointer-events:auto}
  .nav .brand{font-family:'Fraunces',serif;font-size:22px;color:#fff;letter-spacing:.5px}
  .nav .links{display:flex;gap:30px;align-items:center}
  .nav .links a{color:rgba(255,255,255,.85);text-decoration:none;font-size:14px;font-weight:500;letter-spacing:.3px}
  .nav .links a.cta{
    border:1px solid rgba(255,255,255,.5);border-radius:999px;
    padding:9px 20px;color:#fff;
  }
  @media(max-width:720px){.nav .links a:not(.cta){display:none}}

  /* ---------- HERO: image-dominant, minimal text ---------- */
  .hero{
    position:relative;
    /* fallbacks first, then LARGE viewport so it always fills the whole
       screen — even when the mobile address bar retracts and the screen grows */
    height:100vh;
    height:100lvh;
    min-height:620px;
    display:flex;align-items:flex-end;
    overflow:hidden;
  }
  .hero__img{
    position:absolute;inset:0;
    background:url('https://images.unsplash.com/photo-1510591509098-f4fdc6d0ff04?q=92&w=3840&auto=format&fit=crop') 58% 48%/cover no-repeat;
    transform:scale(1.05);
    filter:contrast(1.14) saturate(1.06) brightness(.98);
    animation:slowzoom 20s ease-out forwards;
  }
  @keyframes slowzoom{to{transform:scale(1)}}
  /* readable scrim — deep at the bottom for the text, clean over the cup */
  .hero__scrim{
    position:absolute;inset:0;
    background:
      linear-gradient(to top,rgba(8,7,5,.82) 0%,rgba(8,7,5,.34) 32%,rgba(8,7,5,0) 64%),
      radial-gradient(130% 90% at 40% 118%,rgba(8,7,5,.4),transparent 62%);
  }
  .hero__content{
    position:relative;z-index:2;
    padding:0 clamp(20px,5vw,56px) calc(clamp(48px,8vh,90px) + env(safe-area-inset-bottom));
    max-width:760px;
    animation:rise 1s cubic-bezier(.2,.7,.2,1) both;
  }
  @keyframes rise{from{opacity:0;transform:translateY(26px)}to{opacity:1;transform:none}}
  .hero__eyebrow{
    color:rgba(255,255,255,.9);font-size:13px;font-weight:600;
    letter-spacing:.3em;text-transform:uppercase;margin-bottom:20px;
    text-shadow:0 1px 12px rgba(0,0,0,.35);
  }
  .hero__title{
    font-family:'Fraunces',serif;font-weight:400;
    color:#fff;line-height:1.0;
    font-size:clamp(46px,7.6vw,96px);
    letter-spacing:-.02em;
    text-shadow:0 2px 30px rgba(0,0,0,.32);
  }
  .hero__cta{
    display:inline-flex;align-items:center;gap:10px;
    margin-top:34px;
    background:var(--accent);color:#1a1408;
    font-weight:600;font-size:15px;letter-spacing:.2px;
    padding:15px 30px;border-radius:999px;text-decoration:none;
    transition:transform .25s ease,box-shadow .25s ease;
    box-shadow:0 12px 30px -12px rgba(201,138,60,.7);
  }
  .hero__cta:hover{transform:translateY(-2px);box-shadow:0 18px 38px -12px rgba(201,138,60,.85)}
  .hero__cta svg{width:16px;height:16px}

  /* next section sits fully BELOW the fold — no peek into the hero */
  .next{
    position:relative;z-index:5;
    background:var(--cream);
    padding:96px clamp(20px,5vw,56px);text-align:center;
  }
  .next h2{font-family:'Fraunces',serif;font-weight:400;font-size:clamp(28px,4vw,44px);margin-bottom:14px}
  .next p{max-width:560px;margin:0 auto;color:#5a5347;font-size:17px;line-height:1.7}
</style>
</head>
<body>

  <nav class="nav">
    <div class="brand">Maren &amp; Oak</div>
    <div class="links">
      <a href="#menu">Menu</a>
      <a href="#visit">Visit</a>
      <a class="cta" href="tel:+16125550148">Call</a>
    </div>
  </nav>

  <header class="hero">
    <div class="hero__img"></div>
    <div class="hero__scrim"></div>
    <div class="hero__content">
      <p class="hero__eyebrow">Minneapolis · Est. 2021</p>
      <h1 class="hero__title">Slow mornings,<br>well roasted.</h1>
      <a class="hero__cta" href="#visit">
        Find us
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
      </a>
    </div>
  </header>

  <section class="next" id="menu">
    <h2>A Nordic table in Northeast.</h2>
    <p>Single-origin roasts, cardamom buns out of the oven by seven, and a quiet room built for staying a while.</p>
  </section>

  <script>
    // Reveal the sticky nav only after the user scrolls down past the hero.
    (function(){
      var nav = document.querySelector('.nav');
      var hero = document.querySelector('.hero');
      var ticking = false;
      function update(){
        // show the nav only once the hero is essentially out of sight
        var trigger = hero.offsetHeight - 56;
        nav.classList.toggle('nav--show', window.scrollY > trigger);
        ticking = false;
      }
      window.addEventListener('scroll', function(){
        if(!ticking){ ticking = true; requestAnimationFrame(update); }
      }, {passive:true});
      window.addEventListener('resize', update);
      update();
    })();
  </script>

</body>
</html>
