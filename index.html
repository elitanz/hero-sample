<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Maren &amp; Oak — Nordic Coffee House</title>
<meta name="description" content="Maren & Oak — a Nordic-inspired coffee house in Minneapolis. Slow mornings, single-origin roasts, fresh pastry." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --ink:#16140f;
    --cream:#f6f1e7;
    --accent:#c98a3c;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{font-family:'Inter',system-ui,sans-serif;color:var(--ink);background:var(--cream)}

  /* ---------- NAV: solid from the start ---------- */
  .nav{
    position:fixed;top:0;left:0;right:0;z-index:50;
    display:flex;align-items:center;justify-content:space-between;
    padding:18px clamp(20px,5vw,56px);
    background:rgba(18,16,12,.55);
    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);
  }
  .nav .brand{font-family:'Fraunces',serif;font-size:22px;color:#fff;letter-spacing:.5px}
  .nav .links{display:flex;gap:30px;align-items:center}
  .nav .links a{color:rgba(255,255,255,.85);text-decoration:none;font-size:14px;font-weight:500;letter-spacing:.3px}
  .nav .links a.cta{
    border:1px solid rgba(255,255,255,.5);border-radius:999px;
    padding:9px 20px;color:#fff;
  }
  @media(max-width:720px){.nav .links a:not(.cta){display:none}}

  /* ---------- HERO: image-dominant, minimal text ---------- */
  .hero{
    position:relative;
    height:100svh;min-height:600px;
    display:flex;align-items:flex-end;
    overflow:hidden;
  }
  .hero__img{
    position:absolute;inset:0;
    background:url('https://images.unsplash.com/photo-1554118811-1e0d58224f24?q=80&w=2400&auto=format&fit=crop') center 40%/cover no-repeat;
    transform:scale(1.04);
    animation:slowzoom 18s ease-out forwards;
  }
  @keyframes slowzoom{to{transform:scale(1)}}
  /* subtle scrim — readable, never dims the photo */
  .hero__scrim{
    position:absolute;inset:0;
    background:linear-gradient(to top,rgba(18,16,12,.62) 0%,rgba(18,16,12,.12) 38%,rgba(18,16,12,0) 70%);
  }
  .hero__content{
    position:relative;z-index:2;
    padding:0 clamp(20px,5vw,56px) clamp(48px,8vh,90px);
    max-width:760px;
    animation:rise 1s cubic-bezier(.2,.7,.2,1) both;
  }
  @keyframes rise{from{opacity:0;transform:translateY(26px)}to{opacity:1;transform:none}}
  .hero__eyebrow{
    color:rgba(255,255,255,.82);font-size:13px;font-weight:600;
    letter-spacing:.28em;text-transform:uppercase;margin-bottom:18px;
  }
  .hero__title{
    font-family:'Fraunces',serif;font-weight:400;
    color:#fff;line-height:1.02;
    font-size:clamp(44px,7.4vw,92px);
    letter-spacing:-.01em;
  }
  .hero__cta{
    display:inline-flex;align-items:center;gap:10px;
    margin-top:34px;
    background:var(--accent);color:#1a1408;
    font-weight:600;font-size:15px;letter-spacing:.2px;
    padding:15px 30px;border-radius:999px;text-decoration:none;
    transition:transform .25s ease,box-shadow .25s ease;
    box-shadow:0 12px 30px -12px rgba(201,138,60,.7);
  }
  .hero__cta:hover{transform:translateY(-2px);box-shadow:0 18px 38px -12px rgba(201,138,60,.85)}
  .hero__cta svg{width:16px;height:16px}

  /* next section lifts over the hero */
  .next{
    position:relative;z-index:5;margin-top:-44px;
    background:var(--cream);border-radius:34px 34px 0 0;
    box-shadow:0 -34px 70px -32px rgba(0,0,0,.55);
    padding:84px clamp(20px,5vw,56px);text-align:center;
  }
  .next h2{font-family:'Fraunces',serif;font-weight:400;font-size:clamp(28px,4vw,44px);margin-bottom:14px}
  .next p{max-width:560px;margin:0 auto;color:#5a5347;font-size:17px;line-height:1.7}
</style>
</head>
<body>

  <nav class="nav">
    <div class="brand">Maren &amp; Oak</div>
    <div class="links">
      <a href="#menu">Menu</a>
      <a href="#visit">Visit</a>
      <a class="cta" href="tel:+16125550148">Call</a>
    </div>
  </nav>

  <header class="hero">
    <div class="hero__img"></div>
    <div class="hero__scrim"></div>
    <div class="hero__content">
      <p class="hero__eyebrow">Minneapolis · Est. 2021</p>
      <h1 class="hero__title">Slow mornings,<br>well roasted.</h1>
      <a class="hero__cta" href="#visit">
        Find us
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
      </a>
    </div>
  </header>

  <section class="next" id="menu">
    <h2>A Nordic table in Northeast.</h2>
    <p>Single-origin roasts, cardamom buns out of the oven by seven, and a quiet room built for staying a while.</p>
  </section>

</body>
</html>
